# main configuration file
# Format is self-explanatory. Do not use quotes around multi-word values
[hardware]
CHIP_VARIANT = SAMD51N19A
MAXIMUM_SIZE = 130048
RAM_SIZE = 16384
BUILD_MCU = atmega1284p
F_CPU = 8000000L
UPLOAD_SPEED = 57600

[names]
# Vendor name. Short version, no spaces, lower case, e.g. island_robotics
VENDOR_NAME = envirodiy
# Full, human-readable vendor name, e.g. Island Robotics LLC
VENDOR_NAME_LONG = EnviroDIY

# Main webpage for your project. Among other things, used for
# "More info" link in Arduino board manager
INFO_URL = https://www.envirodiy.org/

# used for "online help" link in Arduino board manager. Should
# be a link to support forum if you have one; otherwise, just copy
# INFO_URL
HELP_URL = https://www.envirodiy.org/help/

MAINTAINER_NAME = Stroud Water Research Center - EnviroDIY
VENDOR_EMAIL = info@envirodiy.org

# machine-friendly  board name, used as directory name in filesystem, e.g. robot_controller_m0
# all lower case, no spaces, add _m0 or _m4 at the end
BOARD_NAME = stonefly_m4

# Human-readable board name, e.g. Robot Controller (M0)
# will be used in Arduino board menu
BOARD_NAME_LONG = EnviroDIY Stonefly

# DEFINE_NAME  is used to set a compile-time macro
# ARDUINO_DEFINE_NAME to allow use of conditional code between #ifdefs.
# E.g. if you set BOARD_DEFINE_NAME = MYBOARD, then you can use
#  #ifdef ARDUINO_MYBOARD in your scripts
# no spaces, use upper case
BOARD_DEFINE_NAME = STONEFLY
# name to use for your custom board support package, e.g.
# My New SAMD Board
# will be used by Board menu of Arduino IDE
PACKAGE_NAME = EnviroDIY SAMD Boards
# Package version
PACKAGE_VERSION = 0.3.7
# Package base url - will have the zip archive name appended to it
PACKAGE_URL = https://github.com/EnviroDIY/Arduino_boards/raw/master/EnviroDIYSAMDBoards/
# URL to the json file with the package index, used for Arduino board manager
# Fill this out if you want to update an existing package based on a downloadable JSON file
# If you are creating a new package, comment this out
PACKAGE_INDEX_URL = https://raw.githubusercontent.com/EnviroDIY/Arduino_boards/refs/heads/master/package_EnviroDIY_index.json
# Location of a local json file with the package index, used for Arduino board manager
# Fill this out if you want to update an existing package based on a local JSON file
# If you are creating a new package, comment this out
PACKAGE_INDEX_FILE = C:/Users/sdamiano/Documents/GitHub/EnviroDIY/Arduino_boards/package_envirodiy_index.json

[additional_build_flags]
# Experts only.
# -D__{chip_variant}__ is always added
# For a SAMD21, these are added:
#    -DARDUINO_SAMD_ZERO -DARM_MATH_CM0PLUS
# For a SAMD51, these are added:
#  -D__SAMD51__ -D__FPU_PRESENT -DARM_MATH_CM4 -mfloat-abi=hard -mfpu=fpv4-sp-d16 -DENABLE_CACHE
# If you have any additional GCC build flags that you want to add, put them here as space-separated list
EXTRA_EXTRA_FLAGS = -DENVIRODIY_STONEFLY -DSD_CHIP_SELECT_MODE=1
# "-DVARIANT_QSPI_BAUD_DEFAULT=50000000"

# For SdFat, defining SD_CHIP_SELECT_MODE as 1 allow overwriting the functions to set the pin mode and level for the SS (slave/chip) select mode
# Chip select mode 1 allows you to write your own functions without requiring it.
# By default, SdFat initializes the SS pin by setting pin mode to OUTPUT,
# prepares to write by setting the SS pin to LOW,
# and finishes communication by setting the SS pin to HIGH.
# ```cpp
# void sdCsInit(SdCsPin_t pin) {
#   initCalls++;
#   pinMode(pin, OUTPUT);
# }
# void sdCsWrite(SdCsPin_t pin, bool level) {
#   writeCalls++;
#   digitalWrite(pin, level);
# }
# ```
# When using hardware SS (MSSEN, the default for the SAMD21 and SAMD15 in the Adafruit core) this is not necessary because the processor
# sets the pin automatically.
# Instead you can add these functions:
# ```cpp
# void sdCsInit(SdCsPin_t pin) {}
# void sdCsWrite(SdCsPin_t pin, bool level) {}
# ```

# cSpell:words ifdefs myboard MSSEN DVARIANT DENABLE DARM DARDUINO DENVIRODIY MFLOAT MFPU POWERPIN PULLUP GCLK PINMUX UART
